<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>SOP Checker — MRP AutoRub</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700;800&display=swap');
:root{--bg:#0f0f0f;--surface:#1a1a1a;--surface2:#242424;--border:#2e2e2e;--accent:#00e5a0;--accent-dim:rgba(0,229,160,0.12);--warn:#ffb800;--warn-dim:rgba(255,184,0,0.12);--danger:#ff4f4f;--danger-dim:rgba(255,79,79,0.1);--purple:#b388ff;--purple-dim:rgba(179,136,255,0.12);--text:#f0f0f0;--muted:#888;--mono:'DM Mono',monospace;--display:'Syne',sans-serif}
.light{--bg:#f5f5f0;--surface:#ffffff;--surface2:#efefea;--border:#ddddd8;--text:#1a1a1a;--muted:#777;--accent-dim:rgba(0,160,110,0.1);--warn-dim:rgba(200,140,0,0.1);--danger-dim:rgba(200,60,60,0.08);--purple-dim:rgba(120,80,200,0.1)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:var(--mono);min-height:100vh;transition:background .2s,color .2s}
/* HEADER */
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 16px 12px;position:sticky;top:0;z-index:100}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:8px}
.brand{font-family:var(--display);font-size:12px;font-weight:700;color:var(--accent);letter-spacing:.05em;text-transform:uppercase}
.hbtns{display:flex;gap:6px}
.icon-btn{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:4px 10px;font-family:var(--mono);font-size:11px;color:var(--muted);cursor:pointer;display:flex;align-items:center;gap:4px;white-space:nowrap}
.icon-btn:active{border-color:var(--accent);color:var(--accent)}
.spin{animation:spin .8s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
.search-wrap{position:relative}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none}
#search{width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;padding:11px 11px 11px 36px;font-family:var(--mono);font-size:15px;color:var(--text);outline:none;transition:border-color .2s;-webkit-appearance:none}
#search:focus{border-color:var(--accent)}
#search::placeholder{color:var(--muted)}
/* TABS */
.tabs{display:flex;border-bottom:1px solid var(--border);background:var(--surface);overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:10px 16px;font-family:var(--mono);font-size:12px;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;background:none;border-top:none;border-left:none;border-right:none}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.view{display:none}.view.active{display:block}
/* FILTERS */
.filters{display:flex;gap:6px;padding:10px 16px;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--border)}
.filters::-webkit-scrollbar{display:none}
.filter-btn{flex-shrink:0;padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:var(--mono);font-size:11px;cursor:pointer;white-space:nowrap}
.filter-btn.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}
/* STATS */
.stats-bar{display:flex;border-bottom:1px solid var(--border)}
.stat{flex:1;padding:10px 0;text-align:center;border-right:1px solid var(--border)}
.stat:last-child{border-right:none}
.stat-num{font-family:var(--display);font-size:18px;font-weight:800;display:block;line-height:1}
.stat-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;display:block;margin-top:3px}
.stat.total .stat-num{color:var(--text)}.stat.done .stat-num{color:var(--accent)}.stat.pend .stat-num{color:var(--warn)}.stat.xtra .stat-num{color:var(--purple)}
/* SYNC */
.sync-bar{text-align:center;padding:5px;font-size:11px;color:var(--muted);border-bottom:1px solid var(--border);background:var(--surface)}
.sync-bar.ok{color:var(--accent)}.sync-bar.err{color:var(--danger)}
/* RESULTS */
.results{padding:12px 16px}
.sec-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px;padding:0 2px}
.sheet-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.1em;margin:12px 2px 6px;font-weight:500}
.sheet-lbl.runner{color:var(--accent)}.sheet-lbl.extra{color:var(--purple)}
/* CARDS */
.part-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:13px 14px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;gap:10px;cursor:pointer}
.part-card:active{background:var(--surface2)}
.part-card.completed{border-left:3px solid var(--accent)}.part-card.pending{border-left:3px solid var(--warn)}.part-card.xtra{border-left:3px solid var(--purple)}
.part-info{flex:1;min-width:0}
.part-no{font-family:var(--display);font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.part-meta{font-size:11px;color:var(--muted);margin-top:2px}
.part-meta span{margin-right:8px}
.badge{flex-shrink:0;padding:5px 10px;border-radius:20px;font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.05em}
.b-done{background:var(--accent-dim);color:var(--accent);border:1px solid rgba(0,229,160,.3)}
.b-pend{background:var(--warn-dim);color:var(--warn);border:1px solid rgba(255,184,0,.3)}
.b-xtra{background:var(--purple-dim);color:var(--purple);border:1px solid rgba(179,136,255,.3)}
/* EMPTY */
.empty{text-align:center;padding:50px 20px;color:var(--muted)}
.empty-icon{font-size:40px;margin-bottom:10px}
.empty-text{font-size:13px;line-height:1.7}
.nf{text-align:center;padding:40px 20px}
.nf-icon{font-size:36px;margin-bottom:10px}
.nf-title{font-family:var(--display);font-size:16px;font-weight:700;color:var(--danger);margin-bottom:6px}
.nf-sub{font-size:12px;color:var(--muted)}
.nf-part{display:inline-block;margin-top:8px;background:var(--danger-dim);border:1px solid rgba(255,79,79,.3);color:var(--danger);padding:3px 10px;border-radius:20px;font-size:12px}
/* DASHBOARD */
.dash{padding:16px}
.dash-title{font-family:var(--display);font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
.overall-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:16px}
.ov-nums{display:flex;margin-bottom:14px}
.ov-num{flex:1;text-align:center;border-right:1px solid var(--border)}
.ov-num:last-child{border-right:none}
.ov-val{font-family:var(--display);font-size:26px;font-weight:800;display:block}
.ov-lbl{font-size:10px;color:var(--muted);text-transform:uppercase}
.prog-wrap{margin-bottom:4px}
.prog-bar{height:12px;background:var(--surface2);border-radius:10px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),#00c4a0);border-radius:10px;transition:width .8s ease}
.prog-pct{font-size:12px;color:var(--accent);text-align:right;margin-top:4px;font-weight:500}
.cat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px}
.cat-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.cat-name{font-family:var(--display);font-size:14px;font-weight:700}
.cat-pct{font-size:12px;font-weight:600}
.cat-bar{height:7px;background:var(--surface2);border-radius:10px;overflow:hidden;margin-bottom:8px}
.cat-bar-fill{height:100%;border-radius:10px;transition:width .7s ease}
.cat-nums{display:flex;gap:14px;font-size:11px}
.c-done{color:var(--accent)}.c-pend{color:var(--warn)}.c-tot{color:var(--muted)}
/* PRINT VIEW */
.print-view{padding:16px}
.print-intro{font-size:12px;color:var(--muted);margin-bottom:14px;line-height:1.6;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px}
.print-section{margin-bottom:10px}
.print-hdr{display:flex;justify-content:space-between;align-items:center;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:6px}
.print-cat{font-family:var(--display);font-size:14px;font-weight:700}
.print-cnt{font-size:11px;color:var(--warn)}
.print-btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:9px 14px;background:var(--accent-dim);border:1px solid rgba(0,229,160,.3);border-radius:8px;color:var(--accent);font-family:var(--mono);font-size:12px;cursor:pointer;width:100%}
.print-btn:active{background:rgba(0,229,160,.2)}
.print-all-btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:12px 14px;background:var(--accent);border:none;border-radius:10px;color:#000;font-family:var(--display);font-size:13px;font-weight:700;cursor:pointer;width:100%;margin-top:6px}
/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:20px 20px 0 0;padding:20px;width:100%;max-width:480px;animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 18px}
.modal-partno{font-family:var(--display);font-size:22px;font-weight:800;margin-bottom:4px}
.modal-row{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid var(--border);font-size:13px}
.modal-row:last-of-type{border-bottom:none}
.modal-key{color:var(--muted)}
.modal-status-big{display:flex;align-items:center;gap:8px;margin-top:14px;padding:13px 16px;border-radius:12px;font-family:var(--display);font-size:15px;font-weight:700}
.msb-done{background:var(--accent-dim);color:var(--accent);border:1px solid rgba(0,229,160,.25)}
.msb-pend{background:var(--warn-dim);color:var(--warn);border:1px solid rgba(255,184,0,.25)}
.msb-xtra{background:var(--purple-dim);color:var(--purple);border:1px solid rgba(179,136,255,.25)}
.modal-close{width:100%;margin-top:10px;padding:12px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--muted);font-family:var(--mono);font-size:13px;cursor:pointer}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-top">
    <div class="brand">MRP AutoRub — SOP Checker</div>
    <div class="hbtns">
      <button class="icon-btn" onclick="toggleTheme()" id="themeBtn">☀ Light</button>
      <button class="icon-btn" onclick="loadData()"><span id="sIcon">↻</span> <span id="sLabel">Sync</span></button>
    </div>
  </div>
  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input type="search" id="search" placeholder="Type part number..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
  </div>
</div>

<!-- TABS -->
<div class="tabs">
  <button class="tab active" onclick="switchTab('search')">🔍 Search</button>
  <button class="tab" onclick="switchTab('dashboard')">📊 Dashboard</button>
  <button class="tab" onclick="switchTab('print')">🖨 Print List</button>
</div>

<!-- ══════ SEARCH VIEW ══════ -->
<div class="view active" id="view-search">
  <div class="filters">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="COMPLETED">✓ Done</button>
    <button class="filter-btn" data-filter="PENDING">⏳ Pending</button>
    <button class="filter-btn" data-filter="EXTRA">⭐ Extra</button>
    <button class="filter-btn" data-filter="EPDM">EPDM</button>
    <button class="filter-btn" data-filter="SILICONE">Silicone</button>
    <button class="filter-btn" data-filter="NITRILE">Nitrile</button>
    <button class="filter-btn" data-filter="BREATHER">Breather</button>
    <button class="filter-btn" data-filter="PACKING">Packing</button>
  </div>
  <div class="stats-bar">
    <div class="stat total"><span class="stat-num" id="st1">—</span><span class="stat-label">Total</span></div>
    <div class="stat done"><span class="stat-num" id="st2">—</span><span class="stat-label">Done</span></div>
    <div class="stat pend"><span class="stat-num" id="st3">—</span><span class="stat-label">Pending</span></div>
    <div class="stat xtra"><span class="stat-num" id="st4">—</span><span class="stat-label">Extra</span></div>
  </div>
  <div class="sync-bar" id="syncBar">Loading...</div>
  <div class="results" id="searchResults">
    <div class="empty"><div class="empty-icon">🔍</div><div class="empty-text">Type a part number to check its SOP status</div></div>
  </div>
</div>

<!-- ══════ DASHBOARD VIEW ══════ -->
<div class="view" id="view-dashboard">
  <div class="sync-bar" id="syncBar2">Loading...</div>
  <div class="dash" id="dashContent">
    <div class="empty"><div class="empty-icon">📊</div><div class="empty-text">Loading dashboard...</div></div>
  </div>
</div>

<!-- ══════ PRINT VIEW ══════ -->
<div class="view" id="view-print">
  <div class="print-view" id="printContent">
    <div class="empty"><div class="empty-icon">🖨</div><div class="empty-text">Loading...</div></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-partno" id="mPartNo"></div>
    <div class="modal-row"><span class="modal-key">Material</span><span id="mMat"></span></div>
    <div class="modal-row"><span class="modal-key">S.No</span><span id="mSno"></span></div>
    <div class="modal-row"><span class="modal-key">List</span><span id="mList"></span></div>
    <div class="modal-status-big" id="mStatus"></div>
    <button class="modal-close" onclick="document.getElementById('modalOverlay').classList.remove('open')">Close</button>
  </div>
</div>

<script>
const S1='https://docs.google.com/spreadsheets/d/e/2PACX-1vRmEC3eQtpQEv5kydGZhhlDs9tQca6nvoGYRe9tEZyjW7J3yigfWIHMN5yoRZhZjoaT0tTnIre0faQw/pub?gid=1204003115&single=true&output=csv';
const S2='https://docs.google.com/spreadsheets/d/e/2PACX-1vRmEC3eQtpQEv5kydGZhhlDs9tQca6nvoGYRe9tEZyjW7J3yigfWIHMN5yoRZhZjoaT0tTnIre0faQw/pub?gid=84377336&single=true&output=csv';

let RUNNER=[],EXTRA=[],currentFilter='all',searchQ='';
let isDark=localStorage.getItem('sop_theme')!=='light';

const CAT_COLORS={EPDM:'#00e5a0',SILICONE:'#b388ff',NITRILE:'#ffb800',BREATHER:'#ff8a65',PACKING:'#4fc3f7','WIRE HOSE':'#f06292',OTHER:'#888'};

function applyTheme(){
  document.body.classList.toggle('light',!isDark);
  document.getElementById('themeBtn').textContent=isDark?'☀ Light':'🌙 Dark';
}
function toggleTheme(){isDark=!isDark;localStorage.setItem('sop_theme',isDark?'dark':'light');applyTheme();}
applyTheme();

function parseCSV(text,source){
  const lines=text.trim().split('\n');
  const parts=[];
  for(let i=1;i<lines.length;i++){
    const cols=lines[i].split(',').map(c=>c.trim().replace(/"/g,''));
    if(source==='extra'){
      if(cols[1]) parts.push({sno:cols[0]||i,partNo:cols[1],material:cols[2]||'',status:'EXTRA',source});
    } else {
      if(cols[1]) parts.push({sno:cols[0]||i,partNo:cols[1],material:cols[2]||'',status:(cols[3]||'PENDING').toUpperCase().trim(),source});
    }
  }
  return parts;
}

async function loadData(){
  const icon=document.getElementById('sIcon'),label=document.getElementById('sLabel');
  icon.className='spin'; label.textContent='Syncing...';
  setSync('Fetching from Google Sheets...','');
  try{
    const[r1,r2]=await Promise.all([fetch(S1+'&t='+Date.now()),fetch(S2+'&t='+Date.now())]);
    const[t1,t2]=await Promise.all([r1.text(),r2.text()]);
    RUNNER=parseCSV(t1,'runner'); EXTRA=parseCSV(t2,'extra');
    const time=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    setSync(`✓ Live — Runner: ${RUNNER.length} | Extra: ${EXTRA.length} | Synced: ${time}`,'ok');
    icon.className=''; label.textContent='Sync';
    renderAll();
  }catch(e){
    setSync('⚠ Sync failed — check internet','err');
    icon.className=''; label.textContent='Retry';
  }
}

function setSync(msg,cls){
  ['syncBar','syncBar2'].forEach(id=>{const el=document.getElementById(id);if(el){el.textContent=msg;el.className='sync-bar '+cls;}});
}

function norm(s){return s.replace(/\s+/g,'').toUpperCase();}
function allParts(){return[...RUNNER,...EXTRA];}

function renderAll(){renderSearch();renderDashboard();renderPrint();}

// ── SEARCH ──
function getFiltered(){
  return allParts().filter(p=>{
    const q=norm(searchQ);
    const ms=!q||norm(p.partNo).includes(q);
    const mf=currentFilter==='all'||p.status===currentFilter||p.material.toUpperCase()===currentFilter;
    return ms&&mf;
  });
}

function renderSearch(){
  const filtered=getFiltered();
  document.getElementById('st1').textContent=filtered.length;
  document.getElementById('st2').textContent=filtered.filter(p=>p.status==='COMPLETED').length;
  document.getElementById('st3').textContent=filtered.filter(p=>p.status==='PENDING').length;
  document.getElementById('st4').textContent=filtered.filter(p=>p.source==='extra').length;
  const el=document.getElementById('searchResults');
  if(!searchQ&&currentFilter==='all'){
    el.innerHTML=`<div class="empty"><div class="empty-icon">🔍</div><div class="empty-text">Type a part number to check its SOP status</div></div>`;return;
  }
  if(searchQ&&filtered.length===0){
    el.innerHTML=`<div class="nf"><div class="nf-icon">⚠</div><div class="nf-title">Not Found</div><div class="nf-sub">Not in runner list or extra parts.</div><div class="nf-part">${searchQ}</div></div>`;return;
  }
  const runner=filtered.filter(p=>p.source==='runner');
  const extra=filtered.filter(p=>p.source==='extra');
  let html=`<div class="sec-label">${filtered.length} part${filtered.length!==1?'s':''} found</div>`;
  if(runner.length){
    if(extra.length) html+=`<div class="sheet-lbl runner">✓ Runner Parts List</div>`;
    runner.forEach(p=>{html+=makeCard(p);});
  }
  if(extra.length){
    if(runner.length) html+=`<div class="sheet-lbl extra">⭐ Extra Parts</div>`;
    extra.forEach(p=>{html+=makeCard(p);});
  }
  el.innerHTML=html;
}

function makeCard(p){
  const isDone=p.status==='COMPLETED',isX=p.source==='extra';
  const cls=isX?'xtra':(isDone?'completed':'pending');
  const badge=isX?`<div class="badge b-xtra">⭐ Extra</div>`:isDone?`<div class="badge b-done">✓ Done</div>`:`<div class="badge b-pend">⏳ Pending</div>`;
  return `<div class="part-card ${cls}" onclick="showModal('${p.partNo.replace(/'/g,"\\'")}','${p.source}')">
    <div class="part-info"><div class="part-no">${p.partNo}</div><div class="part-meta"><span>#${p.sno}</span><span>${p.material||'—'}</span></div></div>${badge}</div>`;
}

// ── DASHBOARD ──
function renderDashboard(){
  const total=RUNNER.length;
  const done=RUNNER.filter(p=>p.status==='COMPLETED').length;
  const pct=total?Math.round(done/total*100):0;
  const cats={};
  RUNNER.forEach(p=>{
    const m=p.material||'OTHER';
    if(!cats[m]) cats[m]={done:0,total:0};
    cats[m].total++;
    if(p.status==='COMPLETED') cats[m].done++;
  });
  let html=`
  <div class="dash-title">Overall Progress</div>
  <div class="overall-card">
    <div class="ov-nums">
      <div class="ov-num"><span class="ov-val" style="color:var(--text)">${total}</span><div class="ov-lbl">Total</div></div>
      <div class="ov-num"><span class="ov-val" style="color:var(--accent)">${done}</span><div class="ov-lbl">Done</div></div>
      <div class="ov-num"><span class="ov-val" style="color:var(--warn)">${total-done}</span><div class="ov-lbl">Pending</div></div>
    </div>
    <div class="prog-wrap">
      <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
      <div class="prog-pct">${pct}% complete</div>
    </div>
  </div>
  <div class="dash-title">By Category</div>`;
  Object.entries(cats).sort((a,b)=>b[1].total-a[1].total).forEach(([cat,data])=>{
    const p=data.total?Math.round(data.done/data.total*100):0;
    const color=CAT_COLORS[cat]||'#888';
    html+=`<div class="cat-card">
      <div class="cat-hdr"><div class="cat-name">${cat}</div><div class="cat-pct" style="color:${color}">${p}%</div></div>
      <div class="cat-bar"><div class="cat-bar-fill" style="width:${p}%;background:${color}"></div></div>
      <div class="cat-nums"><span class="c-done">✓ ${data.done} done</span><span class="c-pend">⏳ ${data.total-data.done} pending</span><span class="c-tot">${data.total} total</span></div>
    </div>`;
  });
  document.getElementById('dashContent').innerHTML=html;
}

// ── PRINT ──
function renderPrint(){
  const cats={};
  RUNNER.filter(p=>p.status==='PENDING').forEach(p=>{
    const m=p.material||'OTHER';
    if(!cats[m]) cats[m]=[];
    cats[m].push(p);
  });
  const totalPending=RUNNER.filter(p=>p.status==='PENDING').length;
  let html=`<div class="print-intro">📋 Select a category to print the pending parts list — give this to your floor worker to set aside parts for SOP preparation.</div>`;
  Object.entries(cats).sort((a,b)=>b[1].length-a[1].length).forEach(([cat,parts])=>{
    html+=`<div class="print-section">
      <div class="print-hdr"><div class="print-cat">${cat}</div><div class="print-cnt">⏳ ${parts.length} pending</div></div>
      <button class="print-btn" onclick="doPrint('${cat}')">🖨 Print ${cat} Pending List</button>
    </div>`;
  });
  html+=`<div style="margin-top:16px">
    <button class="print-all-btn" onclick="doPrint('ALL')">🖨 Print Full Pending List (${totalPending} parts)</button>
  </div>`;
  document.getElementById('printContent').innerHTML=html;
}

function doPrint(cat){
  const parts=cat==='ALL'?RUNNER.filter(p=>p.status==='PENDING'):RUNNER.filter(p=>p.status==='PENDING'&&p.material===cat);
  const date=new Date().toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});
  const rows=parts.map((p,i)=>`<tr><td>${i+1}</td><td><b>${p.partNo}</b></td><td>${p.material}</td><td style="color:#c00;font-weight:bold">PENDING</td></tr>`).join('');
  const win=window.open('','_blank');
  win.document.write(`<!DOCTYPE html><html><head><title>Pending SOPs — ${cat}</title>
  <style>body{font-family:Arial,sans-serif;padding:24px;color:#000}h2{font-size:18px;margin-bottom:4px;color:#1F4E79}p{font-size:12px;color:#666;margin-bottom:20px}table{width:100%;border-collapse:collapse}th{background:#1F4E79;color:#fff;padding:9px 10px;text-align:left;font-size:12px}td{padding:8px 10px;border-bottom:1px solid #e0e0e0;font-size:12px}tr:nth-child(even){background:#f5f8ff}.footer{margin-top:20px;font-size:10px;color:#aaa;border-top:1px solid #eee;padding-top:10px}</style>
  </head><body>
  <h2>MRP AutoRub — Pending SOP List</h2>
  <p>Category: <b>${cat}</b> &nbsp;|&nbsp; Total Pending: <b>${parts.length}</b> &nbsp;|&nbsp; Date: ${date}</p>
  <table><thead><tr><th>#</th><th>Part Number</th><th>Material</th><th>Status</th></tr></thead><tbody>${rows}</tbody></table>
  <div class="footer">Generated from MRP AutoRub SOP Checker — pranoy321.github.io/sop-checker</div>
  <script>window.onload=()=>{window.print()}<\/script></body></html>`);
  win.document.close();
}

// ── MODAL ──
function showModal(partNo,source){
  const list=source==='runner'?RUNNER:EXTRA;
  const p=list.find(x=>x.partNo===partNo);
  if(!p) return;
  const isX=source==='extra',isDone=p.status==='COMPLETED';
  document.getElementById('mPartNo').textContent=p.partNo;
  document.getElementById('mMat').textContent=p.material||'—';
  document.getElementById('mSno').textContent=`#${p.sno}`;
  document.getElementById('mList').textContent=isX?'⭐ Extra Parts':'✓ Runner Parts List';
  const s=document.getElementById('mStatus');
  if(isX){s.className='modal-status-big msb-xtra';s.innerHTML='⭐ &nbsp;SOP COMPLETED — EXTRA PART';}
  else if(isDone){s.className='modal-status-big msb-done';s.innerHTML='✓ &nbsp;SOP COMPLETED';}
  else{s.className='modal-status-big msb-pend';s.innerHTML='⏳ &nbsp;SOP PENDING';}
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal(e){if(e.target===document.getElementById('modalOverlay'))document.getElementById('modalOverlay').classList.remove('open');}

// ── TABS ──
function switchTab(tab){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['search','dashboard','print'][i]===tab));
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('view-'+tab).classList.add('active');
}

// ── FILTERS ──
document.querySelectorAll('.filter-btn').forEach(btn=>{
  btn.addEventListener('click',function(){
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    this.classList.add('active');
    currentFilter=this.dataset.filter;
    renderSearch();
  });
});
document.getElementById('search').addEventListener('input',function(){searchQ=this.value.trim();renderSearch();});

setInterval(loadData,5*60*1000);
loadData();
</script>
