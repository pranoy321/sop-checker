<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>SOP Checker — MRP AutoRub</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700;800&display=swap');
  :root {
    --bg: #0f0f0f; --surface: #1a1a1a; --surface2: #242424; --border: #2e2e2e;
    --accent: #00e5a0; --accent-dim: rgba(0,229,160,0.12);
    --warn: #ffb800; --warn-dim: rgba(255,184,0,0.12);
    --danger: #ff4f4f; --danger-dim: rgba(255,79,79,0.1);
    --purple: #b388ff; --purple-dim: rgba(179,136,255,0.12);
    --text: #f0f0f0; --muted: #888;
    --mono: 'DM Mono', monospace; --display: 'Syne', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); color: var(--text); font-family: var(--mono); min-height: 100vh; }

  .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px 20px 14px; position: sticky; top: 0; z-index: 100; }
  .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .brand { font-family: var(--display); font-size: 13px; font-weight: 700; color: var(--accent); letter-spacing: 0.05em; text-transform: uppercase; }
  .sync-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 4px 10px; font-family: var(--mono); font-size: 11px; color: var(--muted); cursor: pointer; display: flex; align-items: center; gap: 5px; }
  .sync-btn:active { border-color: var(--accent); color: var(--accent); }
  .sync-icon { display: inline-block; }
  .sync-icon.spinning { animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .search-wrap { position: relative; }
  .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 16px; pointer-events: none; }
  #search { width: 100%; background: var(--surface2); border: 1.5px solid var(--border); border-radius: 10px; padding: 12px 12px 12px 38px; font-family: var(--mono); font-size: 15px; color: var(--text); outline: none; transition: border-color 0.2s; -webkit-appearance: none; }
  #search:focus { border-color: var(--accent); }
  #search::placeholder { color: var(--muted); }

  .filters { display: flex; gap: 6px; padding: 10px 20px; overflow-x: auto; scrollbar-width: none; border-bottom: 1px solid var(--border); }
  .filters::-webkit-scrollbar { display: none; }
  .filter-btn { flex-shrink: 0; padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-family: var(--mono); font-size: 11px; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
  .filter-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

  .stats-bar { display: flex; border-bottom: 1px solid var(--border); }
  .stat { flex: 1; padding: 10px 0; text-align: center; border-right: 1px solid var(--border); }
  .stat:last-child { border-right: none; }
  .stat-num { font-family: var(--display); font-size: 18px; font-weight: 800; display: block; line-height: 1; }
  .stat-label { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; display: block; margin-top: 3px; }
  .stat.total .stat-num { color: var(--text); }
  .stat.done .stat-num { color: var(--accent); }
  .stat.pending .stat-num { color: var(--warn); }
  .stat.extra .stat-num { color: var(--purple); }

  .sync-status { text-align: center; padding: 6px; font-size: 11px; color: var(--muted); border-bottom: 1px solid var(--border); background: var(--surface); }
  .sync-status.ok { color: var(--accent); }
  .sync-status.err { color: var(--danger); }

  .results { padding: 12px 16px; }
  .results-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; padding: 0 4px; }

  .sheet-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; margin: 14px 4px 6px; font-weight: 500; }
  .sheet-label.runner { color: var(--accent); }
  .sheet-label.extra { color: var(--purple); }

  .part-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; gap: 12px; cursor: pointer; transition: border-color 0.15s; }
  .part-card:active { background: var(--surface2); }
  .part-card.completed { border-left: 3px solid var(--accent); }
  .part-card.pending { border-left: 3px solid var(--warn); }
  .part-card.extra { border-left: 3px solid var(--purple); }

  .part-info { flex: 1; min-width: 0; }
  .part-no { font-family: var(--display); font-size: 15px; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .part-meta { font-size: 11px; color: var(--muted); margin-top: 3px; }
  .part-meta span { display: inline-block; margin-right: 8px; }

  .status-badge { flex-shrink: 0; padding: 5px 10px; border-radius: 20px; font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; }
  .badge-completed { background: var(--accent-dim); color: var(--accent); border: 1px solid rgba(0,229,160,0.3); }
  .badge-pending { background: var(--warn-dim); color: var(--warn); border: 1px solid rgba(255,184,0,0.3); }
  .badge-extra { background: var(--purple-dim); color: var(--purple); border: 1px solid rgba(179,136,255,0.3); }

  .not-found { text-align: center; padding: 48px 20px; }
  .not-found-icon { font-size: 40px; margin-bottom: 12px; }
  .not-found-title { font-family: var(--display); font-size: 16px; font-weight: 700; color: var(--danger); margin-bottom: 6px; }
  .not-found-sub { font-size: 12px; color: var(--muted); line-height: 1.6; }
  .not-found-partno { display: inline-block; margin-top: 10px; background: var(--danger-dim); border: 1px solid rgba(255,79,79,0.3); color: var(--danger); padding: 4px 12px; border-radius: 20px; font-size: 13px; }

  .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-text { font-size: 13px; line-height: 1.7; }

  .loading-state { text-align: center; padding: 60px 20px; color: var(--muted); }
  .loading-spinner { font-size: 32px; animation: spin 1s linear infinite; display: block; margin-bottom: 12px; }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 200; align-items: flex-end; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 20px 20px 0 0; padding: 20px; width: 100%; max-width: 480px; animation: slideUp 0.25s ease; }
  @keyframes slideUp { from { transform: translateY(60px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 20px; }
  .modal-partno { font-family: var(--display); font-size: 22px; font-weight: 800; margin-bottom: 4px; }
  .modal-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .modal-row:last-of-type { border-bottom: none; }
  .modal-key { color: var(--muted); }
  .modal-val { font-weight: 500; color: var(--text); }
  .modal-status-big { display: flex; align-items: center; gap: 8px; margin-top: 16px; padding: 14px 16px; border-radius: 12px; font-family: var(--display); font-size: 15px; font-weight: 700; }
  .modal-status-big.completed { background: var(--accent-dim); color: var(--accent); border: 1px solid rgba(0,229,160,0.25); }
  .modal-status-big.pending { background: var(--warn-dim); color: var(--warn); border: 1px solid rgba(255,184,0,0.25); }
  .modal-status-big.extra { background: var(--purple-dim); color: var(--purple); border: 1px solid rgba(179,136,255,0.25); }
  .modal-close { width: 100%; margin-top: 12px; padding: 13px; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; color: var(--muted); font-family: var(--mono); font-size: 13px; cursor: pointer; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="brand">MRP AutoRub — SOP Checker</div>
    <button class="sync-btn" onclick="loadData()">
      <span class="sync-icon" id="syncIcon">↻</span>
      <span id="syncLabel">Sync</span>
    </button>
  </div>
  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input type="search" id="search" placeholder="Type part number..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
  </div>
</div>

<div class="filters">
  <button class="filter-btn active" data-filter="all">All</button>
  <button class="filter-btn" data-filter="COMPLETED">✓ Completed</button>
  <button class="filter-btn" data-filter="PENDING">⏳ Pending</button>
  <button class="filter-btn" data-filter="EXTRA">⭐ Extra</button>
  <button class="filter-btn" data-filter="EPDM">EPDM</button>
  <button class="filter-btn" data-filter="SILICONE">Silicone</button>
  <button class="filter-btn" data-filter="NITRILE">Nitrile</button>
  <button class="filter-btn" data-filter="BREATHER">Breather</button>
  <button class="filter-btn" data-filter="PACKING">Packing</button>
</div>

<div class="stats-bar">
  <div class="stat total"><span class="stat-num" id="statTotal">—</span><span class="stat-label">Total</span></div>
  <div class="stat done"><span class="stat-num" id="statDone">—</span><span class="stat-label">Done</span></div>
  <div class="stat pending"><span class="stat-num" id="statPending">—</span><span class="stat-label">Pending</span></div>
  <div class="stat extra"><span class="stat-num" id="statExtra">—</span><span class="stat-label">Extra</span></div>
</div>

<div class="sync-status" id="syncStatus">Loading data...</div>

<div class="results" id="results">
  <div class="loading-state">
    <span class="loading-spinner">↻</span>
    <div>Fetching latest data...</div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-partno" id="modalPartNo"></div>
    <div class="modal-row"><span class="modal-key">Material</span><span class="modal-val" id="modalMaterial"></span></div>
    <div class="modal-row"><span class="modal-key">S.No</span><span class="modal-val" id="modalSno"></span></div>
    <div class="modal-row"><span class="modal-key">List</span><span class="modal-val" id="modalList"></span></div>
    <div class="modal-status-big" id="modalStatusBig"></div>
    <button class="modal-close" onclick="document.getElementById('modalOverlay').classList.remove('open')">Close</button>
  </div>
</div>

<script>
const SHEET1_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRmEC3eQtpQEv5kydGZhhlDs9tQca6nvoGYRe9tEZyjW7J3yigfWIHMN5yoRZhZjoaT0tTnIre0faQw/pub?gid=1204003115&single=true&output=csv';
const SHEET2_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRmEC3eQtpQEv5kydGZhhlDs9tQca6nvoGYRe9tEZyjW7J3yigfWIHMN5yoRZhZjoaT0tTnIre0faQw/pub?gid=84377336&single=true&output=csv';

let RUNNER_PARTS = [];
let EXTRA_PARTS = [];
let currentFilter = 'all';
let searchQuery = '';

function parseCSV(text, source) {
  const lines = text.trim().split('\n');
  const parts = [];
  for (let i = 1; i < lines.length; i++) {
    const cols = lines[i].split(',').map(c => c.trim().replace(/"/g, ''));
    if (cols[1]) {
      parts.push({
        sno: cols[0] || i,
        'Part No': cols[1],
        Material: cols[2] || '',
        Status: source === 'extra' ? 'EXTRA' : (cols[3] || 'PENDING').toUpperCase().trim(),
        source
      });
    }
  }
  return parts;
}

async function loadData() {
  const icon = document.getElementById('syncIcon');
  const label = document.getElementById('syncLabel');
  const statusEl = document.getElementById('syncStatus');
  icon.classList.add('spinning');
  label.textContent = 'Syncing...';
  statusEl.className = 'sync-status';
  statusEl.textContent = 'Fetching from Google Sheets...';

  try {
    const [r1, r2] = await Promise.all([
      fetch(SHEET1_URL + '&t=' + Date.now()),
      fetch(SHEET2_URL + '&t=' + Date.now())
    ]);
    const [t1, t2] = await Promise.all([r1.text(), r2.text()]);
    RUNNER_PARTS = parseCSV(t1, 'runner');
    EXTRA_PARTS = parseCSV(t2, 'extra');

    const timeStr = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
    statusEl.className = 'sync-status ok';
    statusEl.textContent = `✓ Live — Runner: ${RUNNER_PARTS.length} | Extra: ${EXTRA_PARTS.length} | Synced: ${timeStr}`;
    icon.classList.remove('spinning');
    label.textContent = 'Sync';
    render();
  } catch(err) {
    statusEl.className = 'sync-status err';
    statusEl.textContent = '⚠ Sync failed — check internet';
    icon.classList.remove('spinning');
    label.textContent = 'Retry';
    if (RUNNER_PARTS.length === 0) {
      document.getElementById('results').innerHTML = `
        <div class="not-found">
          <div class="not-found-icon">⚠</div>
          <div class="not-found-title">No Internet</div>
          <div class="not-found-sub">Connect to internet and tap Retry.</div>
        </div>`;
    }
  }
}

function normalize(str) { return str.replace(/\s+/g,'').toUpperCase(); }

function getAllParts() { return [...RUNNER_PARTS, ...EXTRA_PARTS]; }

function getFiltered() {
  return getAllParts().filter(p => {
    const q = normalize(searchQuery);
    const matchSearch = !q || normalize(p['Part No']).includes(q);
    const matchFilter = currentFilter === 'all' ||
      p.Status === currentFilter ||
      p.Material.toUpperCase() === currentFilter;
    return matchSearch && matchFilter;
  });
}

function updateStats() {
  const all = getAllParts();
  const filtered = getFiltered();
  document.getElementById('statTotal').textContent = filtered.length;
  document.getElementById('statDone').textContent = filtered.filter(p => p.Status === 'COMPLETED').length;
  document.getElementById('statPending').textContent = filtered.filter(p => p.Status === 'PENDING').length;
  document.getElementById('statExtra').textContent = filtered.filter(p => p.source === 'extra').length;
}

function render() {
  const results = document.getElementById('results');
  const filtered = getFiltered();
  updateStats();
  if (RUNNER_PARTS.length === 0 && EXTRA_PARTS.length === 0) return;

  if (searchQuery && filtered.length === 0) {
    results.innerHTML = `
      <div class="not-found">
        <div class="not-found-icon">⚠</div>
        <div class="not-found-title">Not Found</div>
        <div class="not-found-sub">This part is not in the runner list or extra parts list.</div>
        <div class="not-found-partno">${searchQuery.trim()}</div>
      </div>`;
    return;
  }

  if (!searchQuery && currentFilter === 'all') {
    results.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🔍</div>
        <div class="empty-text">Type a part number to check its SOP status</div>
      </div>`;
    return;
  }

  const runnerFiltered = filtered.filter(p => p.source === 'runner');
  const extraFiltered = filtered.filter(p => p.source === 'extra');

  let html = `<div class="results-label">${filtered.length} part${filtered.length !== 1 ? 's' : ''} found</div>`;

  if (runnerFiltered.length > 0) {
    if (extraFiltered.length > 0) html += `<div class="sheet-label runner">✓ Runner Parts List</div>`;
    runnerFiltered.forEach(p => {
      const isCompleted = p.Status === 'COMPLETED';
      html += `
        <div class="part-card ${isCompleted ? 'completed' : 'pending'}" onclick="showModal('${p['Part No'].replace(/'/g,"\\'")}','runner')">
          <div class="part-info">
            <div class="part-no">${p['Part No']}</div>
            <div class="part-meta"><span>#${p.sno}</span><span>${p.Material}</span></div>
          </div>
          <div class="status-badge ${isCompleted ? 'badge-completed' : 'badge-pending'}">
            ${isCompleted ? '✓ Done' : '⏳ Pending'}
          </div>
        </div>`;
    });
  }

  if (extraFiltered.length > 0) {
    if (runnerFiltered.length > 0) html += `<div class="sheet-label extra">⭐ Extra Parts (Not in Runner List)</div>`;
    extraFiltered.forEach(p => {
      html += `
        <div class="part-card extra" onclick="showModal('${p['Part No'].replace(/'/g,"\\'")}','extra')">
          <div class="part-info">
            <div class="part-no">${p['Part No']}</div>
            <div class="part-meta"><span>#${p.sno}</span><span>${p.Material}</span></div>
          </div>
          <div class="status-badge badge-extra">⭐ Extra</div>
        </div>`;
    });
  }

  results.innerHTML = html;
}

function showModal(partNo, source) {
  const list = source === 'runner' ? RUNNER_PARTS : EXTRA_PARTS;
  const p = list.find(x => x['Part No'] === partNo);
  if (!p) return;
  const isExtra = source === 'extra';
  const isCompleted = p.Status === 'COMPLETED';
  document.getElementById('modalPartNo').textContent = p['Part No'];
  document.getElementById('modalMaterial').textContent = p.Material || '—';
  document.getElementById('modalSno').textContent = `#${p.sno}`;
  document.getElementById('modalList').textContent = isExtra ? '⭐ Extra Parts' : '✓ Runner Parts List';
  const statusEl = document.getElementById('modalStatusBig');
  if (isExtra) {
    statusEl.className = 'modal-status-big extra';
    statusEl.innerHTML = '⭐ &nbsp;SOP COMPLETED — NOT IN RUNNER LIST';
  } else {
    statusEl.className = `modal-status-big ${isCompleted ? 'completed' : 'pending'}`;
    statusEl.innerHTML = isCompleted ? '✓ &nbsp;SOP COMPLETED' : '⏳ &nbsp;SOP PENDING';
  }
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay'))
    document.getElementById('modalOverlay').classList.remove('open');
}

document.getElementById('search').addEventListener('input', function() {
  searchQuery = this.value.trim();
  render();
});

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    currentFilter = this.dataset.filter;
    render();
  });
});

setInterval(loadData, 5 * 60 * 1000);
loadData();
</script>
</body>
</html>
